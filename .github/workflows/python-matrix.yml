
name: Python lint

on:
    push:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name: setup python 3.13
              uses: actions/setup-python@v5
              with:
                pthon-version: "3.13"

            - name: install dependancies
              run: pip install -r requirements.txt

            - name: run linter
              run: flake8

            


